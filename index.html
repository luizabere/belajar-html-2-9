<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <h1 class="text-3xl font-extrabold mb-6 text-slate-800 text-center">Kalkulator Akar Persamaan Non-Linear</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Persamaan f(x):</label>
                        <input type="text" id="equation" value="x^2 - 2" class="w-full border-2 border-slate-200 p-2 rounded-lg focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Tebakan Awal / Batas Bawah (a):</label>
                        <input type="number" id="lowerBound" value="1" step="0.1" class="w-full border-2 border-slate-200 p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Batas Atas (b):</label>
                        <input type="number" id="upperBound" value="2" step="0.1" class="w-full border-2 border-slate-200 p-2 rounded-lg">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Toleransi Error:</label>
                        <input type="number" id="tolerance" value="0.0001" step="0.000001" class="w-full border-2 border-slate-200 p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Maksimal Iterasi:</label>
                        <input type="number" id="maxIter" value="50" class="w-full border-2 border-slate-200 p-2 rounded-lg">
                    </div>
                </div>

                <div class="flex flex-col justify-center bg-green-50 p-4 rounded-xl border border-green-100">
                    <h3 class="font-bold text-black-800 mb-2 text-center">Hasil Perbandingan</h3>
                    <div id="comparisonStats" class="text-sm space-y-2 text-black-700 font-medium">
                        <p>Newton: -</p>
                        <p>Bisection: -</p>
                        <p>Regula Falsi: -</p>
                    </div>
                </div>
            </div>
            
            <button onclick="runAllMethods()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                Jalankan Analisis & Visualisasi
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 h-96">
            <canvas id="myChart"></canvas>
        </div>

        <div id="resultContainer" class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 hidden">
            <h2 class="text-xl font-bold mb-4 text-slate-700">Detail Iterasi Newton-Raphson</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-600">
                        <tr>
                            <th class="p-3 border">Iterasi</th>
                            <th class="p-3 border">xi</th>
                            <th class="p-3 border">f(xi)</th>
                            <th class="p-3 border">Error</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 font-mono"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function runAllMethods() {
            const eq = document.getElementById('equation').value;
            const a = parseFloat(document.getElementById('lowerBound').value);
            const b = parseFloat(document.getElementById('upperBound').value);
            const tol = parseFloat(document.getElementById('tolerance').value);
            const maxI = parseInt(document.getElementById('maxIter').value);

            try {
                const f = (x) => math.evaluate(eq, {x: x});
                const fDash = (x) => math.derivative(eq, 'x').evaluate({x: x});

                // PROSES PERHITUNGAN
                const resNewton = solveNewton(f, fDash, a, tol, maxI);
                const resBisection = solveBisection(f, a, b, tol, maxI);
                const resRegula = solveRegulaFalsi(f, a, b, tol, maxI);

                // UPDATE TAMPILAN
                displayStats(resNewton, resBisection, resRegula);
                updateTable(resNewton.history);
                drawGraph(f, a, b, resNewton.root);
                document.getElementById('resultContainer').classList.remove('hidden');
            } catch (err) {
                alert("Kesalahan: " + err.message);
            }
        }

        // --- ALGORITMA NEWTON RAPHSON ---
        function solveNewton(f, fDash, x0, tol, maxI) {
            let xi = x0; // Inisialisasi tebakan awal
            let history = []; // Array untuk menyimpan riwayat iterasi (untuk tabel)
            
            for (let i = 0; i < maxI; i++) {
                let fxi = f(xi); // Evaluasi nilai fungsi pada xi
                let dfxi = fDash(xi); // Evaluasi nilai turunan pada xi
                
                // Pengecekan Titik Stasioner: Jika turunan mendekati 0, hentikan.
                if (Math.abs(dfxi) < 1e-10) return {root: xi, iter: "Gagal (Turunan Nol)", history};
                
                // Rumus Newton-Raphson: xi+1 = xi - f(xi)/f'(xi)
                let xi_next = xi - (fxi / dfxi); 
                let err = Math.abs(xi_next - xi); // Menghitung error estimasi
                
                history.push({iter: i+1, x: xi, fx: fxi, error: err});
                
                // Cek Konvergensi: Jika error lebih kecil dari toleransi, akar ditemukan
                if (err < tol) return {root: xi_next, iter: (i+1) + " Iterasi", history: history};
                
                xi = xi_next; // Update nilai xi untuk iterasi berikutnya
            }
            return {root: xi, iter: "Mencapai Max Iterasi", history: history};
        }

        function solveBisection(f, a, b, tol, maxI) {
            if (f(a) * f(b) > 0) return {iter: "Gagal (f(a)*f(b) > 0)"};
            let c, iter = 0;
            while ((Math.abs(b - a) / 2) > tol && iter < maxI) {
                iter++;
                c = (a + b) / 2;
                if (f(a) * f(c) < 0) b = c; else a = c;
            }
            return {iter: iter + " Iterasi"};
        }

        function solveRegulaFalsi(f, a, b, tol, maxI) {
            if (f(a) * f(b) > 0) return {iter: "Gagal (f(a)*f(b) > 0)"};
            let c, c_old, iter = 0;
            do {
                iter++;
                c_old = c;
                c = b - (f(b) * (b - a)) / (f(b) - f(a));
                if (f(a) * f(c) < 0) b = c; else a = c;
            } while (Math.abs(c - c_old) > tol && iter < maxI);
            return {iter: iter + " Iterasi"};
        }

        function displayStats(n, b, r) {
            document.getElementById('comparisonStats').innerHTML = `
                <p><b>Newton:</b> ${n.iter}</p>
                <p><b>Akar:</b> ${n.root?.toFixed(6)}</p>
                <hr class="my-1 border-blue-200">
                <p><b>Bisection:</b> ${b.iter}</p>
                <p><b>Regula Falsi:</b> ${r.iter}</p>
            `;
        }

        function updateTable(history) {
            const body = document.getElementById('tableBody');
            body.innerHTML = history.map(h => `
                <tr class="border-b">
                    <td class="p-3 border">${h.iter}</td>
                    <td class="p-3 border">${h.x.toFixed(6)}</td>
                    <td class="p-3 border">${h.fx.toFixed(6)}</td>
                    <td class="p-3 border text-red-500">${h.error.toFixed(6)}</td>
                </tr>
            `).join('');
        }

        function drawGraph(f, a, b, root) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const xVal = [], yVal = [];
            const start = Math.min(a, b, root) - 1, end = Math.max(a, b, root) + 1;
            for (let x = start; x <= end; x += 0.1) { xVal.push(x.toFixed(1)); yVal.push(f(x)); }
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xVal,
                    datasets: [{ label: 'f(x)', data: yVal, borderColor: '#3b82f6', fill: false, pointRadius: 0 },
                    { label: 'Akar', data: [{x: root?.toFixed(1), y: 0}], backgroundColor: 'red', pointRadius: 7, showLine: false }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: {type: 'linear', position: 'bottom'}} }
            });
        }
    </script>
</body>
</html>
